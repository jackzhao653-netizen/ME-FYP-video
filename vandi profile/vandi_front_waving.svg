<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gradients & Glows -->
    <!-- Expanded filter region to prevent clipping on stroked paths without fills -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Surface Materials -->
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8b4a"/>
      <stop offset="100%" stop-color="#184718"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8d9b"/>
      <stop offset="100%" stop-color="#4a4c54"/>
    </linearGradient>
  </defs>

  <!-- HEAD FRONT VIEW (HAPPY) -->
  <g id="head-group" transform="translate(250, 250)">
    
    <!-- ANTENNAS (Waving: Quick waving back and forth) -->
    <g transform="translate(-32, -75)">
      <g id="antenna-left" transform="rotate(-110) scale(1.1, 1)">
        <animateTransform attributeName="transform" type="rotate" values="0; 50; -10; 50; 0" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="0.5s" repeatCount="indefinite" additive="sum" />
        <rect x="0" y="-3" width="60" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="62" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>
    
    <g transform="translate(32, -75)">
      <g id="antenna-right" transform="rotate(-70) scale(1.1, 1)">
        <animateTransform attributeName="transform" type="rotate" values="0; -50; 10; -50; 0" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="0.5s" repeatCount="indefinite" additive="sum" />
        <rect x="0" y="-3" width="60" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="62" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>

    <!-- Head Base -->
    <rect x="-80" y="-75" width="160" height="150" rx="45" fill="url(#headGrad)" stroke="#111" stroke-width="3" />
    
    <!-- RADAR EARS -->
    <g id="radar-ear-left" transform="translate(-80, -5)">
      <path d="M 0 -22 L -10 -28 L -10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="-16" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      <rect x="-18" y="-15" width="4" height="30" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      <path d="M -24 -15 Q -30 0 -24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.6"/>
    </g>

    <g id="radar-ear-right" transform="translate(80, -5)">
      <path d="M 0 -22 L 10 -28 L 10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="10" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      <rect x="14" y="-15" width="4" height="30" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      <path d="M 24 -15 Q 30 0 24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.6"/>
    </g>

    <!-- Front Face / Screen Wrapper -->
    <rect x="-70" y="-60" width="140" height="120" rx="35" fill="#15161a" stroke="#888c94" stroke-width="5" />
    
    <!-- Screen itself -->
    <rect x="-67" y="-57" width="134" height="114" rx="32" fill="url(#screenGrad)" />
    
    <!-- Screen Reflection -->
    <path d="M -50 -50 Q 0 -40 50 -50 Q 55 -30 50 -10 Q 0 -20 -50 -10 Z" fill="#ffffff" opacity="0.04" />

    <!-- Eyes Container (Waving: Centered, shortened from below) -->
    <g id="eyes" data-state="waving" transform="translate(0, 0)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,1; 0,-3; 0,2; 0,-4; 0,1; 0,-2; 0,0" keyTimes="0; 0.1; 0.2; 0.3; 0.4; 0.55; 0.7; 0.85; 1" dur="2s" repeatCount="indefinite" />
        <!-- Left eye -->
        <g transform="translate(-25, 0)">
          <path d="M -7 -16 L 7 -16 A 8 8 0 0 1 15 -8 L 15 -2 A 4 4 0 0 1 11 2 L -11 2 A 4 4 0 0 1 -15 -2 L -15 -8 A 8 8 0 0 1 -7 -16 Z" fill="none" stroke="#00e5ff" stroke-width="12" stroke-linejoin="round" filter="url(#cyanGlow)" />
        </g>
        
        <!-- Right eye -->
        <g transform="translate(25, 0)">
          <path d="M -7 -16 L 7 -16 A 8 8 0 0 1 15 -8 L 15 -2 A 4 4 0 0 1 11 2 L -11 2 A 4 4 0 0 1 -15 -2 L -15 -8 A 8 8 0 0 1 -7 -16 Z" fill="none" stroke="#00e5ff" stroke-width="12" stroke-linejoin="round" filter="url(#cyanGlow)" />
        </g>
      </g>
    </g>
  </g>
</svg>
