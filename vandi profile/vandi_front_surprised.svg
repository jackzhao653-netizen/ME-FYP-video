<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gradients & Glows -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#35363c"/><stop offset="100%" stop-color="#18191d"/></linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#0a0a0c"/></linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a8d9b"/><stop offset="100%" stop-color="#4a4c54"/></linearGradient>
  </defs>

  <!-- HEAD FRONT VIEW (SURPRISED) -->
  <g id="head-group" transform="translate(250, 250)">
    
    <!-- ANTENNAS (Surprised: quick jitter) -->
    <g transform="translate(-20, -78)">
      <g transform="rotate(-90)">
        <animateTransform attributeName="transform" type="rotate" values="-90; -93; -87; -90" keyTimes="0; 0.3; 0.7; 1" dur="1s" repeatCount="indefinite" />
        <rect x="0" y="-3" width="70" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="72" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>
    
    <g transform="translate(20, -78)">
      <g transform="rotate(-90)">
        <animateTransform attributeName="transform" type="rotate" values="-90; -87; -93; -90" keyTimes="0; 0.3; 0.7; 1" dur="1.1s" repeatCount="indefinite" />
        <rect x="0" y="-3" width="70" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="72" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>

    <rect x="-80" y="-75" width="160" height="150" rx="45" fill="url(#headGrad)" stroke="#111" stroke-width="3" />
    
    <g id="radar-ear-left" transform="translate(-80, -5)">
      <path d="M 0 -22 L -10 -28 L -10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="-16" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      <rect x="-18" y="-15" width="4" height="30" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      <path d="M -24 -15 Q -30 0 -24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.6"/>
    </g>

    <g id="radar-ear-right" transform="translate(80, -5)">
      <path d="M 0 -22 L 10 -28 L 10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="10" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      <rect x="14" y="-15" width="4" height="30" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      <path d="M 24 -15 Q 30 0 24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.6"/>
    </g>

    <rect x="-70" y="-60" width="140" height="120" rx="35" fill="#15161a" stroke="#888c94" stroke-width="5" />
    <rect x="-67" y="-57" width="134" height="114" rx="32" fill="url(#screenGrad)" />
    <path d="M -50 -50 Q 0 -40 50 -50 Q 55 -30 50 -10 Q 0 -20 -50 -10 Z" fill="#ffffff" opacity="0.04" />

    <!-- Eyes Container (Surprised: single pop opening) -->
    <g id="eyes" data-state="surprised" transform="translate(0, -5)">
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.8; 1.15; 1; 1" keyTimes="0; 0.3; 0.6; 1" dur="1.2s" fill="freeze" />
        <!-- Left eye -->
        <g transform="translate(-25, 0)">
          <circle cx="0" cy="0" r="16" fill="#00e5ff" filter="url(#cyanGlow)" />
        </g>
        
        <!-- Right eye -->
        <g transform="translate(25, 0)">
          <circle cx="0" cy="0" r="16" fill="#00e5ff" filter="url(#cyanGlow)" />
        </g>
      </g>
    </g>
  </g>
</svg>
