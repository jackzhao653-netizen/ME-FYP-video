<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gradients & Glows -->
    <filter id="cyanGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a8b4a"/><stop offset="100%" stop-color="#184718"/></linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a1e"/><stop offset="100%" stop-color="#0a0a0c"/></linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a8d9b"/><stop offset="100%" stop-color="#4a4c54"/></linearGradient>
  </defs>

  <!-- HEAD FRONT VIEW (LISTEN) -->
  <g id="head-group" transform="translate(250, 250)">
    
    <!-- ANTENNAS (Listen: scanning wobble) -->
    <g transform="translate(-30, -75)">
      <g transform="rotate(-90)">
        <animateTransform attributeName="transform" type="rotate" values="-90; -85; -90; -95; -90" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="2s" repeatCount="indefinite" />
        <rect x="0" y="-3" width="65" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="67" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>
    
    <g transform="translate(30, -75)">
      <g transform="rotate(-70)">
        <animateTransform attributeName="transform" type="rotate" values="-70; -68; -72; -70" keyTimes="0; 0.3; 0.7; 1" dur="2.5s" repeatCount="indefinite" />
        <rect x="0" y="-3" width="60" height="6" rx="3" fill="url(#metalGrad)" />
        <circle cx="62" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      </g>
    </g>

    <rect x="-80" y="-75" width="160" height="150" rx="45" fill="url(#headGrad)" stroke="#111" stroke-width="3" />
    
    <g id="radar-ear-left" transform="translate(-80, -5)">
      <path d="M 0 -22 L -10 -28 L -10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="-16" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      
      <!-- Listening ear lights up brighter -->
      <rect x="-18" y="-20" width="4" height="40" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      
      <!-- Extra radar waves coming in (Animated pulse) -->
      <!-- Inner wave -->
      <path d="M -24 -15 Q -30 0 -24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)">
        <animate attributeName="opacity" values="0; 0.8; 0" keyTimes="0; 0.2; 1" dur="1.5s" repeatCount="indefinite" />
      </path>
      <!-- Middle wave -->
      <path d="M -32 -25 Q -40 0 -32 25" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)">
        <animate attributeName="opacity" values="0; 0; 0.6; 0" keyTimes="0; 0.2; 0.5; 1" dur="1.5s" repeatCount="indefinite" />
      </path>
      <!-- Outer wave -->
      <path d="M -42 -35 Q -52 0 -42 35" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)">
        <animate attributeName="opacity" values="0; 0; 0; 0.3; 0" keyTimes="0; 0.2; 0.5; 0.8; 1" dur="1.5s" repeatCount="indefinite" />
      </path>
    </g>

    <g id="radar-ear-right" transform="translate(80, -5)">
      <path d="M 0 -22 L 10 -28 L 10 28 L 0 22 Z" fill="#222328" stroke="#111" stroke-width="2" />
      <rect x="10" y="-35" width="6" height="70" rx="3" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      <rect x="14" y="-15" width="4" height="30" rx="2" fill="#00e5ff" filter="url(#cyanGlow)" />
      <!-- Standard small wave on the inactive ear -->
      <path d="M 24 -15 Q 30 0 24 15" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.4"/>
    </g>

    <rect x="-70" y="-60" width="140" height="120" rx="35" fill="#15161a" stroke="#888c94" stroke-width="5" />
    <rect x="-67" y="-57" width="134" height="114" rx="32" fill="url(#screenGrad)" />
    <path d="M -50 -50 Q 0 -40 50 -50 Q 55 -30 50 -10 Q 0 -20 -50 -10 Z" fill="#ffffff" opacity="0.04" />

    <!-- Eyes Container (Listen: slight lateral drift) -->
    <g id="eyes" data-state="listen" transform="translate(-8, -5)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; -2,0; 0,0; -1,0; 0,0" keyTimes="0; 0.2; 0.5; 0.7; 1" dur="3s" repeatCount="indefinite" />
        <!-- Left eye -->
        <g transform="translate(-22, 0)">
          <rect x="-15" y="-15" width="30" height="30" rx="8" fill="#00e5ff" filter="url(#cyanGlow)" />
        </g>
        
        <!-- Right eye -->
        <g transform="translate(22, 0)">
          <rect x="-15" y="-15" width="30" height="30" rx="8" fill="#00e5ff" filter="url(#cyanGlow)" />
        </g>
      </g>
    </g>
  </g>
</svg>
