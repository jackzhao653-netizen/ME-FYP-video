<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 180" width="165" height="180">
  <defs>
    <linearGradient id="bodyGrad-neutral" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A7A8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A5A6C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headGrad-neutral" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6A8A9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A6A7C;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-neutral">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Body -->
  <rect x="40" y="90" width="85" height="75" rx="8" fill="url(#bodyGrad-neutral)"/>
  
  <!-- Arms -->
  <rect x="25" y="105" width="12" height="45" rx="6" fill="#3A5A6C"/>
  <rect x="128" y="105" width="12" height="45" rx="6" fill="#3A5A6C"/>
  
  <!-- Head -->
  <circle cx="82.5" cy="50" r="35" fill="url(#headGrad-neutral)"/>
  
  <!-- Eyes - simple circles with inner highlight -->
  <circle cx="70" cy="45" r="8" fill="#00E5FF" filter="url(#glow-neutral)"/>
  <circle cx="70" cy="42" r="2.5" fill="#A0E0FF"/>
  
  <circle cx="95" cy="45" r="8" fill="#00E5FF" filter="url(#glow-neutral)"/>
  <circle cx="95" cy="42" r="2.5" fill="#A0E0FF"/>
  
  <!-- Mouth - neutral line -->
  <line x1="72" y1="62" x2="93" y2="62" stroke="#2A4A5C" stroke-width="2" stroke-linecap="round"/>
</svg>
