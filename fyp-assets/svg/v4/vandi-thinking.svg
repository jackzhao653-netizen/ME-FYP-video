<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BB5E8"/>
      <stop offset="100%" stop-color="#3A7CA5"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C5F7C"/>
      <stop offset="100%" stop-color="#1A3F52"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="262" rx="44" ry="10" fill="#1A3F52" opacity="0.25"/>

  <!-- Base -->
  <rect x="72" y="242" width="56" height="22" rx="11" fill="#2C5F7C"/>
  <rect x="76" y="246" width="48" height="14" rx="7" fill="#3A7CA5"/>

  <!-- Body -->
  <rect x="58" y="138" width="84" height="104" rx="16" fill="#3A7CA5"/>
  <rect x="62" y="142" width="76" height="96" rx="13" fill="url(#bodyGrad)"/>
  <rect x="78" y="172" width="44" height="28" rx="5" fill="#2C5F7C" opacity="0.35"/>
  <circle cx="100" cy="186" r="7" fill="#3A7CA5" opacity="0.6"/>
  <rect x="83" y="208" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>
  <rect x="83" y="216" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>

  <!-- Left arm — neutral -->
  <rect x="34" y="158" width="22" height="52" rx="11" fill="#3A7CA5"/>
  <rect x="36" y="160" width="18" height="48" rx="9" fill="#4A9FD8"/>
  <circle cx="45" cy="215" r="11" fill="#3A7CA5"/>
  <circle cx="45" cy="215" r="8" fill="#5BB5E8"/>

  <!-- Right arm — raised to chin (thinking pose) -->
  <rect x="144" y="148" width="22" height="52" rx="11" fill="#3A7CA5" transform="rotate(-15 155 148)"/>
  <rect x="146" y="150" width="18" height="48" rx="9" fill="#4A9FD8" transform="rotate(-15 155 148)"/>
  <circle cx="162" cy="200" r="11" fill="#3A7CA5"/>
  <circle cx="162" cy="200" r="8" fill="#5BB5E8"/>

  <!-- Head — slight tilt -->
  <g transform="rotate(-4 100 95)">
    <rect x="48" y="38" width="104" height="112" rx="22" fill="url(#headGrad)"/>
    <rect x="53" y="43" width="94" height="102" rx="17" fill="#1E4A5F"/>
    <rect x="58" y="48" width="84" height="92" rx="13" fill="#091E2B"/>
    <rect x="60" y="50" width="80" height="88" rx="11" fill="#0A2535"/>

    <!-- Eyes: Thinking — asymmetric, looking up-right -->
    <rect x="69" y="80" width="22" height="8" rx="4" fill="#00E5FF" filter="url(#glow)"/>
    <!-- Right eye shifted right (looking sideways) -->
    <rect x="110" y="80" width="22" height="8" rx="4" fill="#00E5FF" filter="url(#glow)"/>
    <!-- Eye squint — thin bar overlay on left eye bottom -->
    <rect x="69" y="85" width="22" height="4" rx="2" fill="#0A2535" opacity="0.5"/>
  </g>

  <!-- Thought bubble dots -->
  <circle cx="148" cy="56" r="3" fill="#00E5FF" opacity="0.35" filter="url(#glow)"/>
  <circle cx="158" cy="46" r="5" fill="#00E5FF" opacity="0.25" filter="url(#glow)"/>
  <circle cx="171" cy="37" r="7" fill="#00E5FF" opacity="0.15" filter="url(#glow)"/>

  <!-- Antenna -->
  <line x1="100" y1="38" x2="100" y2="18" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="13" r="6" fill="#4A9FD8"/>
  <circle cx="100" cy="13" r="3" fill="#A0E0FF" opacity="0.8"/>
</svg>
