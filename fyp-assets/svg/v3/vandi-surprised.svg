<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Vandi - Surprised Pose -->
  
  <!-- Base/Wheels -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  
  <!-- Body Details -->
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  
  <!-- Arms - raised in surprise -->
  <rect x="30" y="150" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(-25 40 150)"/>
  <circle cx="35" cy="205" r="12" fill="#5BB5E8"/>
  
  <rect x="150" y="150" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(25 160 150)"/>
  <circle cx="165" cy="205" r="12" fill="#5BB5E8"/>
  
  <!-- Head/Screen -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  
  <!-- Screen Display -->
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  
  <!-- Eyes - Very wide (surprised) -->
  <circle cx="80" cy="85" r="16" fill="#5BB5E8"/>
  <circle cx="80" cy="85" r="12" fill="#FFFFFF"/>
  <circle cx="80" cy="85" r="7" fill="#0A2F3F"/>
  <circle cx="82" cy="82" r="3" fill="#FFFFFF"/>
  
  <circle cx="120" cy="85" r="16" fill="#5BB5E8"/>
  <circle cx="120" cy="85" r="12" fill="#FFFFFF"/>
  <circle cx="120" cy="85" r="7" fill="#0A2F3F"/>
  <circle cx="122" cy="82" r="3" fill="#FFFFFF"/>
  
  <!-- Surprise lines -->
  <line x1="55" y1="70" x2="48" y2="65" stroke="#5BB5E8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="145" y1="70" x2="152" y2="65" stroke="#5BB5E8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="58" y1="80" x2="50" y2="78" stroke="#5BB5E8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="142" y1="80" x2="150" y2="78" stroke="#5BB5E8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Antenna - vibrating -->
  <line x1="100" y1="40" x2="98" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="98" cy="15" r="6" fill="#5BB5E8"/>
  <circle cx="98" cy="15" r="3" fill="#FFFFFF" opacity="0.6"/>
</svg>
