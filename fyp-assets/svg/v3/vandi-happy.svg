<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Vandi - Happy Pose -->
  
  <!-- Base/Wheels -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  
  <!-- Body Details -->
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  
  <!-- Arms - Slightly raised -->
  <rect x="35" y="155" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(-10 45 155)"/>
  <circle cx="42" cy="210" r="12" fill="#5BB5E8"/>
  
  <rect x="145" y="155" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(10 155 155)"/>
  <circle cx="158" cy="210" r="12" fill="#5BB5E8"/>
  
  <!-- Head/Screen -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  
  <!-- Screen Display -->
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  
  <!-- Eyes - Happy (wide and sparkly) -->
  <ellipse cx="80" cy="82" rx="14" ry="18" fill="#5BB5E8"/>
  <ellipse cx="80" cy="82" rx="10" ry="14" fill="#FFFFFF"/>
  <circle cx="82" cy="80" r="6" fill="#0A2F3F"/>
  <circle cx="84" cy="78" r="3" fill="#FFFFFF"/>
  <circle cx="78" cy="84" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  
  <ellipse cx="120" cy="82" rx="14" ry="18" fill="#5BB5E8"/>
  <ellipse cx="120" cy="82" rx="10" ry="14" fill="#FFFFFF"/>
  <circle cx="122" cy="80" r="6" fill="#0A2F3F"/>
  <circle cx="124" cy="78" r="3" fill="#FFFFFF"/>
  <circle cx="118" cy="84" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Sparkles around eyes -->
  <circle cx="65" cy="75" r="2" fill="#5BB5E8" opacity="0.8"/>
  <circle cx="135" cy="75" r="2" fill="#5BB5E8" opacity="0.8"/>
  <circle cx="70" cy="95" r="1.5" fill="#5BB5E8" opacity="0.6"/>
  <circle cx="130" cy="95" r="1.5" fill="#5BB5E8" opacity="0.6"/>
  
  <!-- Antenna - slightly bouncy -->
  <line x1="100" y1="40" x2="100" y2="18" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="13" r="7" fill="#5BB5E8"/>
  <circle cx="100" cy="13" r="4" fill="#FFFFFF" opacity="0.8"/>
</svg>
