<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Vandi - Thinking Pose -->
  
  <!-- Base/Wheels -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  
  <!-- Body Details -->
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  
  <!-- Arms -->
  <rect x="35" y="160" width="20" height="50" rx="10" fill="#4A9FD8"/>
  <circle cx="45" cy="215" r="12" fill="#5BB5E8"/>
  
  <rect x="145" y="160" width="20" height="50" rx="10" fill="#4A9FD8"/>
  <circle cx="155" cy="215" r="12" fill="#5BB5E8"/>
  
  <!-- Head/Screen - tilted slightly -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C" transform="rotate(-3 100 95)"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F" transform="rotate(-3 100 95)"/>
  
  <!-- Screen Display -->
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F" transform="rotate(-3 100 95)"/>
  
  <!-- Eyes - Looking to the side (right) -->
  <g transform="rotate(-3 100 95)">
    <ellipse cx="80" cy="85" rx="12" ry="15" fill="#5BB5E8"/>
    <ellipse cx="80" cy="85" rx="8" ry="11" fill="#FFFFFF"/>
    <circle cx="84" cy="85" r="5" fill="#0A2F3F"/>
    <circle cx="86" cy="83" r="2" fill="#FFFFFF" opacity="0.8"/>
    
    <ellipse cx="120" cy="85" rx="12" ry="15" fill="#5BB5E8"/>
    <ellipse cx="120" cy="85" rx="8" ry="11" fill="#FFFFFF"/>
    <circle cx="124" cy="85" r="5" fill="#0A2F3F"/>
    <circle cx="126" cy="83" r="2" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- Thought indicators -->
  <circle cx="145" cy="60" r="3" fill="#5BB5E8" opacity="0.4"/>
  <circle cx="155" cy="50" r="5" fill="#5BB5E8" opacity="0.3"/>
  <circle cx="168" cy="42" r="7" fill="#5BB5E8" opacity="0.2"/>
  
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="6" fill="#5BB5E8"/>
  <circle cx="100" cy="15" r="3" fill="#FFFFFF" opacity="0.6"/>
</svg>
