<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Vandi - Waving Pose -->
  
  <!-- Base/Wheels -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  
  <!-- Body Details -->
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  
  <!-- Left Arm - normal -->
  <rect x="35" y="160" width="20" height="50" rx="10" fill="#4A9FD8"/>
  <circle cx="45" cy="215" r="12" fill="#5BB5E8"/>
  
  <!-- Right Arm - raised and waving -->
  <rect x="145" y="80" width="20" height="60" rx="10" fill="#4A9FD8" transform="rotate(-45 155 80)"/>
  <circle cx="175" cy="95" r="12" fill="#5BB5E8"/>
  
  <!-- Motion lines for waving -->
  <path d="M 180 85 Q 185 80 190 85" stroke="#5BB5E8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 182 90 Q 188 85 194 90" stroke="#5BB5E8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Head/Screen -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  
  <!-- Screen Display -->
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  
  <!-- Eyes - Friendly -->
  <ellipse cx="80" cy="85" rx="13" ry="16" fill="#5BB5E8"/>
  <ellipse cx="80" cy="85" rx="9" ry="12" fill="#FFFFFF"/>
  <circle cx="82" cy="83" r="5" fill="#0A2F3F"/>
  <circle cx="84" cy="81" r="2.5" fill="#FFFFFF"/>
  
  <ellipse cx="120" cy="85" rx="13" ry="16" fill="#5BB5E8"/>
  <ellipse cx="120" cy="85" rx="9" ry="12" fill="#FFFFFF"/>
  <circle cx="122" cy="83" r="5" fill="#0A2F3F"/>
  <circle cx="124" cy="81" r="2.5" fill="#FFFFFF"/>
  
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="6" fill="#5BB5E8"/>
  <circle cx="100" cy="15" r="3" fill="#FFFFFF" opacity="0.6"/>
</svg>
