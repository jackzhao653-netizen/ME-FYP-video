<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bodyGradientWork" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D7AB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGradientWork" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pupilGlowWork" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C9A93;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="225" rx="60" ry="8" fill="#000000" opacity="0.15"/>
  
  <!-- Body base -->
  <path d="M 100 200 L 70 180 L 70 120 Q 70 80 100 80 Q 130 80 130 120 L 130 180 Z" 
        fill="url(#bodyGradientWork)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Body top/head dome -->
  <ellipse cx="100" cy="80" rx="45" ry="50" fill="url(#bodyGradientWork)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Antenna (active) -->
  <line x1="100" y1="30" x2="100" y2="45" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="27" r="5" fill="#FF6B35"/>
  <circle cx="100" cy="27" r="3" fill="#FFD93D"/>
  
  <!-- Signal waves from antenna -->
  <path d="M 90 32 Q 85 27 85 22" stroke="#4ECDC4" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 110 32 Q 115 27 115 22" stroke="#4ECDC4" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Left eye (focused, slightly narrowed) -->
  <ellipse cx="80" cy="76" rx="18" ry="16" fill="url(#eyeGradientWork)" stroke="#2C5F8D" stroke-width="2"/>
  <circle cx="80" cy="76" r="11" fill="url(#pupilGlowWork)"/>
  <circle cx="80" cy="76" r="7" fill="#1A5F5A"/>
  <circle cx="82" cy="74" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Right eye (focused, slightly narrowed) -->
  <ellipse cx="120" cy="76" rx="18" ry="16" fill="url(#eyeGradientWork)" stroke="#2C5F8D" stroke-width="2"/>
  <circle cx="120" cy="76" r="11" fill="url(#pupilGlowWork)"/>
  <circle cx="120" cy="76" r="7" fill="#1A5F5A"/>
  <circle cx="122" cy="74" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Gear/cog icon near head -->
  <g transform="translate(145, 85)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#FF6B35" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#FF6B35"/>
    <rect x="-1.5" y="-10" width="3" height="4" fill="#FF6B35"/>
    <rect x="-1.5" y="6" width="3" height="4" fill="#FF6B35"/>
    <rect x="-10" y="-1.5" width="4" height="3" fill="#FF6B35"/>
    <rect x="6" y="-1.5" width="4" height="3" fill="#FF6B35"/>
  </g>
  
  <!-- Chest panel (active/processing) -->
  <rect x="85" y="130" width="30" height="35" rx="3" fill="#2C5F8D" opacity="0.4"/>
  <circle cx="100" cy="140" r="3" fill="#4ECDC4" opacity="0.9"/>
  <circle cx="100" cy="147" r="3" fill="#4ECDC4" opacity="0.7"/>
  <circle cx="100" cy="154" r="3" fill="#4ECDC4" opacity="0.5"/>
  
  <!-- Progress bar -->
  <rect x="85" y="165" width="30" height="3" rx="1.5" fill="#2C5F8D" opacity="0.3"/>
  <rect x="85" y="165" width="20" height="3" rx="1.5" fill="#4ECDC4" opacity="0.8"/>
  
  <!-- Side panels/details (active) -->
  <rect x="68" y="140" width="4" height="20" rx="2" fill="#FF6B35" opacity="0.9"/>
  <rect x="128" y="140" width="4" height="20" rx="2" fill="#FF6B35" opacity="0.9"/>
  
  <!-- Bottom base -->
  <rect x="75" y="195" width="50" height="10" rx="3" fill="#2C5F8D"/>
</svg>
