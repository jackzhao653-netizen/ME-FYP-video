<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bodyGradientError" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D7AB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGradientError" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pupilGlowError" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8A44C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4843D;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="225" rx="60" ry="8" fill="#000000" opacity="0.15"/>
  
  <!-- Body base -->
  <path d="M 100 200 L 70 180 L 70 120 Q 70 80 100 80 Q 130 80 130 120 L 130 180 Z" 
        fill="url(#bodyGradientError)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Body top/head dome -->
  <ellipse cx="100" cy="80" rx="45" ry="50" fill="url(#bodyGradientError)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Antenna (warning state) -->
  <line x1="100" y1="30" x2="100" y2="45" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="27" r="5" fill="#FF4444"/>
  <circle cx="100" cy="27" r="3" fill="#FF6B6B"/>
  <circle cx="100" cy="27" r="8" fill="#FF4444" opacity="0.3"/>
  
  <!-- Left eye (concerned/confused - different sizes) -->
  <circle cx="80" cy="75" r="18" fill="url(#eyeGradientError)" stroke="#2C5F8D" stroke-width="2"/>
  <circle cx="80" cy="75" r="12" fill="url(#pupilGlowError)"/>
  <circle cx="80" cy="75" r="8" fill="#8B5A3C"/>
  <circle cx="83" cy="72" r="3" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Right eye (concerned/confused - different angle) -->
  <ellipse cx="120" cy="77" rx="16" ry="20" fill="url(#eyeGradientError)" stroke="#2C5F8D" stroke-width="2"/>
  <ellipse cx="120" cy="77" rx="11" ry="13" fill="url(#pupilGlowError)"/>
  <ellipse cx="120" cy="77" rx="7" ry="9" fill="#8B5A3C"/>
  <circle cx="122" cy="74" r="3" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Warning symbol -->
  <g transform="translate(145, 75)">
    <path d="M 0 -10 L 8 6 L -8 6 Z" fill="none" stroke="#FF6B35" stroke-width="2"/>
    <circle cx="0" cy="0" r="1.5" fill="#FF6B35"/>
    <line x1="0" y1="-5" x2="0" y2="-2" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Exclamation marks -->
  <text x="55" y="85" font-family="Arial, sans-serif" font-size="16" fill="#FF6B35" opacity="0.7">!</text>
  
  <!-- Chest panel (error state) -->
  <rect x="85" y="130" width="30" height="35" rx="3" fill="#2C5F8D" opacity="0.3"/>
  <circle cx="100" cy="147" r="6" fill="#FF6B35" opacity="0.8"/>
  <text x="100" y="151" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">!</text>
  
  <!-- Side panels/details (warning) -->
  <rect x="68" y="140" width="4" height="20" rx="2" fill="#FF4444" opacity="0.8"/>
  <rect x="128" y="140" width="4" height="20" rx="2" fill="#FF4444" opacity="0.8"/>
  
  <!-- Error indicator lines -->
  <line x1="85" y1="170" x2="95" y2="170" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
  <line x1="105" y1="170" x2="115" y2="170" stroke="#FF6B35" stroke-width="2" opacity="0.6"/>
  
  <!-- Bottom base -->
  <rect x="75" y="195" width="50" height="10" rx="3" fill="#2C5F8D"/>
</svg>
