<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <!-- Base -->
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <!-- Left arm (drooping slightly) -->
  <rect x="33" y="165" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(5,43,190)"/>
  <circle cx="43" cy="220" r="12" fill="#5BB5E8"/>
  <!-- Right arm (drooping slightly) -->
  <rect x="147" y="165" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(-5,157,190)"/>
  <circle cx="157" cy="220" r="12" fill="#5BB5E8"/>
  <!-- Head (tilted slightly down) -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  <!-- Eyes: sad - angled downward at outer edges -->
  <rect x="70" y="83" width="22" height="7" rx="3" fill="#00E5FF" filter="url(#glow)" transform="rotate(8,81,87)"/>
  <rect x="108" y="83" width="22" height="7" rx="3" fill="#00E5FF" filter="url(#glow)" transform="rotate(-8,119,87)"/>
  <!-- Sad mouth -->
  <path d="M88,115 Q100,108 112,115" stroke="#00E5FF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4" filter="url(#glow)"/>
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="6" fill="#5BB5E8"/>
  <circle cx="100" cy="15" r="3" fill="#FFFFFF" opacity="0.6"/>
</svg>
