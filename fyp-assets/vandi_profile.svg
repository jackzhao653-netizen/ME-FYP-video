<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gradients & Glows -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Surface Materials -->
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8b4a"/>
      <stop offset="100%" stop-color="#184718"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8d9b"/>
      <stop offset="100%" stop-color="#4a4c54"/>
    </linearGradient>
  </defs>

  <!-- HEAD 3/4 View facing right -->
  <!-- Centered in canvas -->
  <g id="head-group" transform="translate(250, 250) rotate(10)">
    
    <!-- ANTENNAS (Top of the head) -->
    <!-- Front Antenna (Pointing slightly back) -->
    <g id="antenna-front" transform="translate(-15, -78) rotate(-70)">
      <rect x="0" y="-3" width="50" height="6" rx="3" fill="url(#metalGrad)" />
      <circle cx="52" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
    </g>
    
    <!-- Back Antenna (Pointing more steeply up) -->
    <g id="antenna-back" transform="translate(-45, -80) rotate(-85)">
      <rect x="0" y="-3" width="65" height="6" rx="3" fill="url(#metalGrad)" />
      <circle cx="67" cy="0" r="8" fill="#00e5ff" filter="url(#cyanGlow)" />
    </g>

    <!-- Head Base (Back/Left side panel showing depth) -->
    <rect x="-110" y="-80" width="200" height="160" rx="55" fill="url(#headGrad)" stroke="#111" stroke-width="3" />
    
    <!-- RADAR EAR (Left side foreground) -->
    <g id="radar-ear" transform="translate(-80, 0)">
      <!-- Radar Dish Base / Mount -->
      <path d="M 0 -25 L -20 -40 Q -30 0 -20 40 L 0 25 Z" fill="#222328" stroke="#111" stroke-width="2" />
      
      <!-- Radar Dish Dome -->
      <ellipse cx="-20" cy="0" rx="15" ry="40" fill="url(#metalGrad)" stroke="#111" stroke-width="2" />
      
      <!-- Inner Radar Ring -->
      <ellipse cx="-22" cy="0" rx="8" ry="32" fill="#184718" stroke="#555" stroke-width="2" />
      
      <!-- Radar Center Node (Glowing) -->
      <ellipse cx="-24" cy="0" rx="4" ry="12" fill="#00e5ff" filter="url(#cyanGlow)" />
      <ellipse cx="-24" cy="0" rx="2" ry="6" fill="#e0ffff" />
      
      <!-- Radar Waves (Decorative) -->
      <path d="M -35 -15 Q -45 0 -35 15" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.6"/>
      <path d="M -45 -25 Q -60 0 -45 25" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" filter="url(#cyanGlow)" opacity="0.3"/>
    </g>

    <!-- Front Face / Screen Wrapper -->
    <rect x="-25" y="-65" width="115" height="130" rx="35" fill="#15161a" stroke="#888c94" stroke-width="5" />
    
    <!-- Screen itself -->
    <rect x="-22" y="-62" width="109" height="124" rx="32" fill="url(#screenGrad)" />
    
    <!-- Screen Reflection -->
    <path d="M -15 -55 Q 30 -45 80 -55 Q 85 -35 80 -15 Q 30 -25 -15 -15 Z" fill="#ffffff" opacity="0.04" />

    <!-- Eyes Container (on the screen) -->
    <!-- Added data-state="neutral" if they want to swap them out in animation -->
    <g id="eyes" data-state="neutral" transform="translate(32, 5)">
      <!-- Left eye -->
      <rect id="eye-left" x="-42" y="-12" width="30" height="20" rx="8" fill="#00e5ff" filter="url(#cyanGlow)" />
      
      <!-- Right eye -->
      <rect id="eye-right" x="2" y="-12" width="28" height="20" rx="8" fill="#00e5ff" filter="url(#cyanGlow)" />
    </g>
  </g>

</svg>
