<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90B8"/>
      <stop offset="100%" stop-color="#2C5F7C"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243F52"/>
      <stop offset="100%" stop-color="#142530"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="262" rx="44" ry="10" fill="#1A3F52" opacity="0.2"/>

  <!-- Base -->
  <rect x="72" y="242" width="56" height="22" rx="11" fill="#2C5F7C"/>
  <rect x="76" y="246" width="48" height="14" rx="7" fill="#3A7CA5"/>

  <!-- Body — slightly slumped higher -->
  <rect x="58" y="142" width="84" height="100" rx="16" fill="#2C5F7C"/>
  <rect x="62" y="146" width="76" height="92" rx="13" fill="url(#bodyGrad)"/>
  <rect x="78" y="174" width="44" height="26" rx="5" fill="#1A3F52" opacity="0.4"/>
  <circle cx="100" cy="187" r="7" fill="#2C5F7C" opacity="0.6"/>
  <rect x="83" y="208" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>
  <rect x="83" y="216" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>

  <!-- Left arm — drooping inward -->
  <rect x="36" y="162" width="22" height="52" rx="11" fill="#2C5F7C" transform="rotate(8 47 162)"/>
  <rect x="38" y="164" width="18" height="48" rx="9" fill="#3A7CA5" transform="rotate(8 47 162)"/>
  <circle cx="48" cy="218" r="11" fill="#2C5F7C"/>
  <circle cx="48" cy="218" r="8" fill="#4A90B8"/>

  <!-- Right arm — drooping inward -->
  <rect x="142" y="162" width="22" height="52" rx="11" fill="#2C5F7C" transform="rotate(-8 153 162)"/>
  <rect x="144" y="164" width="18" height="48" rx="9" fill="#3A7CA5" transform="rotate(-8 153 162)"/>
  <circle cx="152" cy="218" r="11" fill="#2C5F7C"/>
  <circle cx="152" cy="218" r="8" fill="#4A90B8"/>

  <!-- Head casing — very slight forward tilt -->
  <g transform="rotate(2 100 95)">
    <rect x="48" y="40" width="104" height="112" rx="22" fill="url(#headGrad)"/>
    <rect x="53" y="45" width="94" height="102" rx="17" fill="#142530"/>
    <rect x="58" y="50" width="84" height="92" rx="13" fill="#060F14"/>
    <rect x="60" y="52" width="80" height="88" rx="11" fill="#081218"/>

    <!-- Eyes: Exact design from Details03.jpg - circular with inner highlight -->
    <circle cx="81" cy="86" r="10" fill="#4AB8D0" filter="url(#glow)"/>
    <circle cx="81" cy="83" r="3" fill="#7ABFCF" opacity="0.7"/>
    <circle cx="119" cy="86" r="10" fill="#4AB8D0" filter="url(#glow)"/>
    <circle cx="119" cy="83" r="3" fill="#7ABFCF" opacity="0.7"/>

    <!-- Teardrop -->
    <ellipse cx="80" cy="102" rx="2.5" ry="4" fill="#4AB8D0" opacity="0.5"/>
    <ellipse cx="120" cy="102" rx="2.5" ry="4" fill="#4AB8D0" opacity="0.5"/>
  </g>

  <!-- Antenna — dim, slightly droopy -->
  <line x1="100" y1="40" x2="101" y2="20" stroke="#2C5F7C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="101" cy="15" r="6" fill="#3A7CA5" opacity="0.7"/>
  <circle cx="101" cy="15" r="3" fill="#7ABFCF" opacity="0.4"/>
</svg>
