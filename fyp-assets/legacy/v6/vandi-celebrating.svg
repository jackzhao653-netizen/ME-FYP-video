<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6BC5F0"/>
      <stop offset="100%" stop-color="#4A9FD8"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7CA5"/>
      <stop offset="100%" stop-color="#2C5F7C"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="262" rx="44" ry="10" fill="#1A3F52" opacity="0.3"/>

  <!-- Base -->
  <rect x="72" y="242" width="56" height="22" rx="11" fill="#3A7CA5"/>
  <rect x="76" y="246" width="48" height="14" rx="7" fill="#4A9FD8"/>

  <!-- Body — slightly bounced up -->
  <rect x="58" y="135" width="84" height="104" rx="16" fill="#4A9FD8"/>
  <rect x="62" y="139" width="76" height="96" rx="13" fill="url(#bodyGrad)"/>
  <rect x="78" y="169" width="44" height="28" rx="5" fill="#3A7CA5" opacity="0.4"/>
  <circle cx="100" cy="183" r="7" fill="#4A9FD8" opacity="0.7"/>
  <rect x="83" y="205" width="34" height="3" rx="1.5" fill="#3A7CA5" opacity="0.5"/>
  <rect x="83" y="213" width="34" height="3" rx="1.5" fill="#3A7CA5" opacity="0.5"/>

  <!-- Left arm — raised high -->
  <rect x="28" y="140" width="22" height="52" rx="11" fill="#4A9FD8" transform="rotate(-35 39 140)"/>
  <rect x="30" y="142" width="18" height="48" rx="9" fill="#6BC5F0" transform="rotate(-35 39 140)"/>
  <circle cx="32" cy="195" r="11" fill="#4A9FD8"/>
  <circle cx="32" cy="195" r="8" fill="#A0E0FF"/>

  <!-- Right arm — raised high -->
  <rect x="150" y="140" width="22" height="52" rx="11" fill="#4A9FD8" transform="rotate(35 161 140)"/>
  <rect x="152" y="142" width="18" height="48" rx="9" fill="#6BC5F0" transform="rotate(35 161 140)"/>
  <circle cx="168" cy="195" r="11" fill="#4A9FD8"/>
  <circle cx="168" cy="195" r="8" fill="#A0E0FF"/>

  <!-- Head casing -->
  <rect x="48" y="35" width="104" height="112" rx="22" fill="url(#headGrad)"/>
  <rect x="53" y="40" width="94" height="102" rx="17" fill="#2C5F7C"/>
  <rect x="58" y="45" width="84" height="92" rx="13" fill="#0F2A38"/>
  <rect x="60" y="47" width="80" height="88" rx="11" fill="#122E3F"/>

  <!-- Eyes: Exact design from Details03.jpg - circular with inner highlight -->
  <circle cx="81" cy="83" r="10" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="81" cy="80" r="3" fill="#A0E0FF" opacity="0.9"/>
  <circle cx="119" cy="83" r="10" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="119" cy="80" r="3" fill="#A0E0FF" opacity="0.9"/>

  <!-- Confetti sparkles -->
  <circle cx="35" cy="50" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="165" cy="55" r="2.5" fill="#FF6B9D" opacity="0.8"/>
  <circle cx="50" cy="25" r="2" fill="#00E5FF" opacity="0.7"/>
  <circle cx="150" cy="30" r="2.5" fill="#A0E0FF" opacity="0.7"/>
  <rect x="42" y="60" width="4" height="4" fill="#FFD700" opacity="0.6" transform="rotate(45 44 62)"/>
  <rect x="158" y="45" width="3" height="3" fill="#FF6B9D" opacity="0.6" transform="rotate(30 159.5 46.5)"/>

  <!-- Antenna — bright, bouncy -->
  <line x1="100" y1="35" x2="100" y2="15" stroke="#4A9FD8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="10" r="6" fill="#6BC5F0"/>
  <circle cx="100" cy="10" r="3" fill="#FFD700" opacity="0.9"/>
</svg>
