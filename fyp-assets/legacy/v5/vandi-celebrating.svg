<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBright" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Sparkle effects -->
  <polygon points="30,50 33,42 36,50 33,58" fill="#FFD700" opacity="0.7"/>
  <polygon points="170,40 173,32 176,40 173,48" fill="#FFD700" opacity="0.6"/>
  <polygon points="25,100 27,95 29,100 27,105" fill="#00FFFF" opacity="0.5"/>
  <polygon points="175,80 177,75 179,80 177,85" fill="#00FFFF" opacity="0.5"/>
  <circle cx="20" cy="70" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="180" cy="60" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="40" cy="30" r="1.5" fill="#00FFFF" opacity="0.4"/>
  <circle cx="160" cy="25" r="1.5" fill="#00FFFF" opacity="0.4"/>
  <!-- Confetti bits -->
  <rect x="15" y="85" width="4" height="4" rx="1" fill="#FF6B9D" opacity="0.6" transform="rotate(30,17,87)"/>
  <rect x="182" y="70" width="4" height="4" rx="1" fill="#7B68EE" opacity="0.6" transform="rotate(-20,184,72)"/>
  <rect x="35" y="40" width="3" height="5" rx="1" fill="#50C878" opacity="0.5" transform="rotate(45,36,42)"/>
  <rect x="168" y="35" width="3" height="5" rx="1" fill="#FF6347" opacity="0.5" transform="rotate(-35,170,37)"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <!-- Base -->
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <!-- Left arm (raised up!) -->
  <rect x="32" y="110" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(30,42,135)"/>
  <circle cx="22" cy="105" r="12" fill="#5BB5E8"/>
  <!-- Right arm (raised up!) -->
  <rect x="148" y="110" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(-30,158,135)"/>
  <circle cx="178" cy="105" r="12" fill="#5BB5E8"/>
  <!-- Head -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  <!-- Eyes: extra wide happy arcs (celebrating!) -->
  <path d="M68,90 Q81,76 94,90" stroke="#00FFFF" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glowBright)"/>
  <path d="M106,90 Q119,76 132,90" stroke="#00FFFF" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glowBright)"/>
  <!-- Big smile -->
  <path d="M85,108 Q100,120 115,108" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)"/>
  <!-- Antenna (excited, bouncing) -->
  <line x1="100" y1="40" x2="100" y2="15" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="10" r="7" fill="#FFD700"/>
  <circle cx="100" cy="10" r="4" fill="#FFFFFF" opacity="0.8"/>
</svg>
