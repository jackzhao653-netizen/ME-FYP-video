<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="100" cy="260" rx="45" ry="15" fill="#2C5F7C" opacity="0.3"/>
  <!-- Base -->
  <rect x="70" y="240" width="60" height="25" rx="12" fill="#3A7CA5"/>
  <!-- Body -->
  <rect x="60" y="140" width="80" height="100" rx="15" fill="#4A9FD8"/>
  <rect x="65" y="145" width="70" height="90" rx="12" fill="#5BB5E8"/>
  <circle cx="100" cy="180" r="8" fill="#3A7CA5" opacity="0.5"/>
  <rect x="85" y="200" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <rect x="85" y="210" width="30" height="3" rx="1.5" fill="#3A7CA5" opacity="0.4"/>
  <!-- Left arm (slightly forward, working) -->
  <rect x="33" y="155" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(-10,43,180)"/>
  <circle cx="39" cy="208" r="12" fill="#5BB5E8"/>
  <!-- Right arm (slightly forward, working) -->
  <rect x="147" y="155" width="20" height="50" rx="10" fill="#4A9FD8" transform="rotate(10,157,180)"/>
  <circle cx="161" cy="208" r="12" fill="#5BB5E8"/>
  <!-- Head -->
  <rect x="50" y="40" width="100" height="110" rx="20" fill="#2C5F7C"/>
  <rect x="55" y="45" width="90" height="100" rx="15" fill="#1E4A5F"/>
  <rect x="60" y="50" width="80" height="90" rx="12" fill="#0A2F3F"/>
  <!-- Eyes: focused/narrowed horizontal bars -->
  <rect x="70" y="87" width="22" height="5" rx="2" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="108" y="87" width="22" height="5" rx="2" fill="#00E5FF" filter="url(#glow)"/>
  <!-- Progress bar on screen -->
  <rect x="72" y="108" width="56" height="4" rx="2" fill="#0D3D52"/>
  <rect x="72" y="108" width="38" height="4" rx="2" fill="#00E5FF" opacity="0.6" filter="url(#glow)"/>
  <!-- Scanning line effect -->
  <line x1="68" y1="100" x2="132" y2="100" stroke="#00FFFF" stroke-width="1" opacity="0.2"/>
  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="6" fill="#5BB5E8"/>
  <circle cx="100" cy="15" r="3" fill="#00FFFF" opacity="0.8"/>
</svg>
