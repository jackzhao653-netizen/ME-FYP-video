<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bodyGradientThink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D7AB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGradientThink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4F8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pupilGlowThink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C9A93;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="225" rx="60" ry="8" fill="#000000" opacity="0.15"/>
  
  <!-- Body base -->
  <path d="M 100 200 L 70 180 L 70 120 Q 70 80 100 80 Q 130 80 130 120 L 130 180 Z" 
        fill="url(#bodyGradientThink)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Body top/head dome (slightly tilted) -->
  <ellipse cx="98" cy="80" rx="45" ry="50" fill="url(#bodyGradientThink)" stroke="#2C5F8D" stroke-width="2"/>
  
  <!-- Antenna -->
  <line x1="98" y1="30" x2="98" y2="45" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <circle cx="98" cy="27" r="5" fill="#FF6B35"/>
  <circle cx="98" cy="27" r="3" fill="#FFD93D" opacity="0.8"/>
  
  <!-- Left eye (looking up-right, contemplative) -->
  <circle cx="78" cy="75" r="18" fill="url(#eyeGradientThink)" stroke="#2C5F8D" stroke-width="2"/>
  <circle cx="81" cy="72" r="12" fill="url(#pupilGlowThink)"/>
  <circle cx="81" cy="72" r="8" fill="#1A5F5A"/>
  <circle cx="84" cy="69" r="3" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Right eye (slightly narrowed, looking up-right) -->
  <ellipse cx="118" cy="75" rx="16" ry="18" fill="url(#eyeGradientThink)" stroke="#2C5F8D" stroke-width="2"/>
  <circle cx="121" cy="72" r="11" fill="url(#pupilGlowThink)"/>
  <circle cx="121" cy="72" r="7" fill="#1A5F5A"/>
  <circle cx="124" cy="69" r="3" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Thought bubbles -->
  <circle cx="140" cy="50" r="4" fill="#FFFFFF" stroke="#2C5F8D" stroke-width="1" opacity="0.8"/>
  <circle cx="150" cy="40" r="6" fill="#FFFFFF" stroke="#2C5F8D" stroke-width="1" opacity="0.8"/>
  <circle cx="165" cy="35" r="8" fill="#FFFFFF" stroke="#2C5F8D" stroke-width="1" opacity="0.8"/>
  <text x="165" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2C5F8D" text-anchor="middle">?</text>
  
  <!-- Chest panel (pulsing) -->
  <rect x="85" y="130" width="30" height="35" rx="3" fill="#2C5F8D" opacity="0.3"/>
  <circle cx="100" cy="147" r="6" fill="#4ECDC4" opacity="0.5"/>
  
  <!-- Side panels/details -->
  <rect x="68" y="140" width="4" height="20" rx="2" fill="#FF6B35" opacity="0.7"/>
  <rect x="128" y="140" width="4" height="20" rx="2" fill="#FF6B35" opacity="0.7"/>
  
  <!-- Bottom base -->
  <rect x="75" y="195" width="50" height="10" rx="3" fill="#2C5F8D"/>
</svg>
