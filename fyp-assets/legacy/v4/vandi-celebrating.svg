<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BB5E8"/>
      <stop offset="100%" stop-color="#3A7CA5"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C5F7C"/>
      <stop offset="100%" stop-color="#1A3F52"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="262" rx="44" ry="10" fill="#1A3F52" opacity="0.25"/>

  <!-- Base -->
  <rect x="72" y="242" width="56" height="22" rx="11" fill="#2C5F7C"/>
  <rect x="76" y="246" width="48" height="14" rx="7" fill="#3A7CA5"/>

  <!-- Body — slightly bounced up -->
  <rect x="58" y="134" width="84" height="108" rx="16" fill="#3A7CA5"/>
  <rect x="62" y="138" width="76" height="100" rx="13" fill="url(#bodyGrad)"/>
  <rect x="78" y="168" width="44" height="28" rx="5" fill="#2C5F7C" opacity="0.35"/>
  <circle cx="100" cy="182" r="7" fill="#4A9FD8" opacity="0.8"/>
  <rect x="83" y="204" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>
  <rect x="83" y="212" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>

  <!-- Left arm — raised high in celebration -->
  <rect x="24" y="118" width="22" height="55" rx="11" fill="#3A7CA5" transform="rotate(-50 35 118)"/>
  <rect x="26" y="120" width="18" height="51" rx="9" fill="#4A9FD8" transform="rotate(-50 35 118)"/>
  <circle cx="22" cy="162" r="11" fill="#3A7CA5"/>
  <circle cx="22" cy="162" r="8" fill="#5BB5E8"/>

  <!-- Right arm — raised high in celebration -->
  <rect x="154" y="118" width="22" height="55" rx="11" fill="#3A7CA5" transform="rotate(50 165 118)"/>
  <rect x="156" y="120" width="18" height="51" rx="9" fill="#4A9FD8" transform="rotate(50 165 118)"/>
  <circle cx="178" cy="162" r="11" fill="#3A7CA5"/>
  <circle cx="178" cy="162" r="8" fill="#5BB5E8"/>

  <!-- Head casing -->
  <rect x="48" y="34" width="104" height="112" rx="22" fill="url(#headGrad)"/>
  <rect x="53" y="39" width="94" height="102" rx="17" fill="#1E4A5F"/>
  <rect x="58" y="44" width="84" height="92" rx="13" fill="#091E2B"/>
  <rect x="60" y="46" width="80" height="88" rx="11" fill="#0A2535"/>

  <!-- Eyes: Celebrating — large bright upward arcs -->
  <path d="M 67 88 Q 81 72 95 88" stroke="#00E5FF" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 105 88 Q 119 72 133 88" stroke="#00E5FF" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Confetti / sparkles -->
  <circle cx="42" cy="60" r="3.5" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="158" cy="55" r="3.5" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="48" cy="80" r="2.5" fill="#A0E0FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="152" cy="85" r="2.5" fill="#A0E0FF" opacity="0.6" filter="url(#glow)"/>
  <rect x="35" y="70" width="5" height="5" rx="1" fill="#5BB5E8" opacity="0.7" transform="rotate(35 37 72)"/>
  <rect x="162" y="68" width="5" height="5" rx="1" fill="#5BB5E8" opacity="0.7" transform="rotate(35 164 70)"/>
  <circle cx="30" cy="100" r="2" fill="#3A7CA5" opacity="0.5"/>
  <circle cx="170" cy="105" r="2" fill="#3A7CA5" opacity="0.5"/>

  <!-- Antenna — tip glowing bright -->
  <line x1="100" y1="34" x2="100" y2="14" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="9" r="7" fill="#4A9FD8"/>
  <circle cx="100" cy="9" r="4" fill="#A0E0FF" opacity="0.9" filter="url(#glow)"/>
</svg>
