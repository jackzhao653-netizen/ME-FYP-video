<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BB5E8"/>
      <stop offset="100%" stop-color="#3A7CA5"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C5F7C"/>
      <stop offset="100%" stop-color="#1A3F52"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="262" rx="44" ry="10" fill="#1A3F52" opacity="0.25"/>

  <!-- Base -->
  <rect x="72" y="242" width="56" height="22" rx="11" fill="#2C5F7C"/>
  <rect x="76" y="246" width="48" height="14" rx="7" fill="#3A7CA5"/>

  <!-- Body -->
  <rect x="58" y="138" width="84" height="104" rx="16" fill="#3A7CA5"/>
  <rect x="62" y="142" width="76" height="96" rx="13" fill="url(#bodyGrad)"/>
  <rect x="78" y="172" width="44" height="28" rx="5" fill="#2C5F7C" opacity="0.35"/>
  <!-- Pulsing activity indicator -->
  <circle cx="100" cy="186" r="7" fill="#00E5FF" opacity="0.5" filter="url(#glow)"/>
  <rect x="83" y="208" width="34" height="3" rx="1.5" fill="#2C5F7C" opacity="0.5"/>
  <rect x="83" y="214" width="26" height="3" rx="1.5" fill="#2C5F7C" opacity="0.4"/>
  <rect x="83" y="220" width="18" height="3" rx="1.5" fill="#2C5F7C" opacity="0.3"/>

  <!-- Left arm — angled toward body (typing) -->
  <rect x="36" y="168" width="22" height="46" rx="11" fill="#3A7CA5" transform="rotate(18 47 168)"/>
  <rect x="38" y="170" width="18" height="42" rx="9" fill="#4A9FD8" transform="rotate(18 47 168)"/>
  <circle cx="55" cy="215" r="11" fill="#3A7CA5"/>
  <circle cx="55" cy="215" r="8" fill="#5BB5E8"/>

  <!-- Right arm — angled toward body (typing) -->
  <rect x="142" y="168" width="22" height="46" rx="11" fill="#3A7CA5" transform="rotate(-18 153 168)"/>
  <rect x="144" y="170" width="18" height="42" rx="9" fill="#4A9FD8" transform="rotate(-18 153 168)"/>
  <circle cx="145" cy="215" r="11" fill="#3A7CA5"/>
  <circle cx="145" cy="215" r="8" fill="#5BB5E8"/>

  <!-- Head — slight forward lean -->
  <g transform="rotate(3 100 95)">
    <rect x="48" y="40" width="104" height="112" rx="22" fill="url(#headGrad)"/>
    <rect x="53" y="45" width="94" height="102" rx="17" fill="#1E4A5F"/>
    <rect x="58" y="50" width="84" height="92" rx="13" fill="#091E2B"/>
    <rect x="60" y="52" width="80" height="88" rx="11" fill="#0A2535"/>

    <!-- Eyes: Working — narrow focused bars (squinted concentration) -->
    <rect x="69" y="84" width="24" height="6" rx="3" fill="#00E5FF" filter="url(#glow)"/>
    <rect x="107" y="84" width="24" height="6" rx="3" fill="#00E5FF" filter="url(#glow)"/>

    <!-- Code lines on lower screen -->
    <rect x="67" y="106" width="28" height="2.5" rx="1" fill="#00E5FF" opacity="0.35"/>
    <rect x="67" y="112" width="38" height="2.5" rx="1" fill="#00E5FF" opacity="0.35"/>
    <rect x="67" y="118" width="22" height="2.5" rx="1" fill="#00E5FF" opacity="0.25"/>
    <rect x="67" y="124" width="34" height="2.5" rx="1" fill="#00E5FF" opacity="0.3"/>
  </g>

  <!-- Antenna — blink glow -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#3A7CA5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="15" r="6" fill="#4A9FD8"/>
  <circle cx="100" cy="15" r="3" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
</svg>
