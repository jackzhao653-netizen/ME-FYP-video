<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3f55"/><stop offset="50%" stop-color="#1e293b"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2538"/><stop offset="100%" stop-color="#0f1928"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e0f9ff"/>
      <stop offset="30%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bodyShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="fuelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="antennaOrb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0f9ff"/><stop offset="50%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="wheelGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#374151"/><stop offset="70%" stop-color="#1f2937"/><stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="wheelRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9"/><stop offset="100%" stop-color="#0891b2" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="eyeHalo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="chassisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3f55"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- SPARKLES (behind body) -->
  <g id="sparkles" filter="url(#sparkleGlow)">
    <!-- Star sparkle top-left -->
    <g transform="translate(68, 130)">
      <path d="M0,-12 L2.5,-2.5 L12,0 L2.5,2.5 L0,12 L-2.5,2.5 L-12,0 L-2.5,-2.5 Z" fill="#22d3ee" opacity="0.9"/>
    </g>
    <!-- Star sparkle top-right -->
    <g transform="translate(332, 115)">
      <path d="M0,-9 L2,0 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#a5f3fc" opacity="0.8"/>
    </g>
    <!-- Small dot sparkles -->
    <circle cx="55" cy="195" r="5" fill="#22d3ee" opacity="0.7"/>
    <circle cx="345" cy="175" r="4" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="340" cy="220" r="3" fill="#22d3ee" opacity="0.6"/>
    <circle cx="60" cy="240" r="3" fill="#a5f3fc" opacity="0.6"/>
    <!-- Cross sparkle right -->
    <g transform="translate(350, 140)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#a5f3fc" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#a5f3fc" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>

  <!-- WHEELS — bounced up (shifted -15px) -->
  <g id="wheels">
    <g transform="translate(88, 375)">
      <ellipse cx="2" cy="36" rx="32" ry="8" fill="#000000" opacity="0.2"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#wheelRim)" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.8"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <circle cx="32" cy="0" r="4" fill="#2d3f55"/><circle cx="-32" cy="0" r="4" fill="#2d3f55"/>
      <circle cx="0" cy="32" r="4" fill="#2d3f55"/><circle cx="0" cy="-32" r="4" fill="#2d3f55"/>
    </g>
    <g transform="translate(312, 375)">
      <ellipse cx="2" cy="36" rx="32" ry="8" fill="#000000" opacity="0.2"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#wheelRim)" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.8"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <circle cx="32" cy="0" r="4" fill="#2d3f55"/><circle cx="-32" cy="0" r="4" fill="#2d3f55"/>
      <circle cx="0" cy="32" r="4" fill="#2d3f55"/><circle cx="0" cy="-32" r="4" fill="#2d3f55"/>
    </g>
    <g transform="translate(118, 405)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
    <g transform="translate(282, 405)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
  </g>

  <!-- CHASSIS -->
  <g id="chassis">
    <path d="M 80 365 Q 80 385 100 395 L 300 395 Q 320 385 320 365 L 320 335 Q 320 325 310 325 L 90 325 Q 80 325 80 335 Z"
          fill="url(#chassisGrad)" filter="url(#bodyShadow)"/>
    <rect x="85" y="355" width="30" height="8" rx="4" fill="#1e293b"/>
    <rect x="285" y="355" width="30" height="8" rx="4" fill="#1e293b"/>
  </g>

  <!-- BODY — bounced up 15px -->
  <g id="body" filter="url(#bodyShadow)" transform="translate(0, -15)">
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodyGrad)"/>
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodySheen)"/>

    <g id="fuel-glow">
      <rect x="84" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.85"/>
      <rect x="86" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
      <rect x="84" y="220" width="28" height="80" rx="14" fill="#8b5cf6" opacity="0.2" filter="url(#eyeGlow)"/>
      <rect x="288" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.85"/>
      <rect x="290" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
      <rect x="288" y="220" width="28" height="80" rx="14" fill="#8b5cf6" opacity="0.2" filter="url(#eyeGlow)"/>
    </g>

    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="url(#faceGrad)"/>
    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.5"/>

    <!-- EYES — wide open, larger pupils, excited -->
    <g id="eyes">
      <ellipse cx="163" cy="248" rx="32" ry="28" fill="#22d3ee" opacity="0.2" filter="url(#eyeHalo)"/>
      <ellipse cx="237" cy="248" rx="32" ry="28" fill="#22d3ee" opacity="0.2" filter="url(#eyeHalo)"/>
      <!-- Left eye – taller -->
      <rect x="132" y="220" width="60" height="54" rx="15" fill="#050e1a"/>
      <rect x="136" y="224" width="52" height="46" rx="12" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <ellipse cx="149" cy="234" rx="8" ry="6" fill="#ffffff" opacity="0.65"/>
      <ellipse cx="170" cy="240" rx="3.5" ry="2.5" fill="#ffffff" opacity="0.35"/>
      <!-- Right eye – taller -->
      <rect x="208" y="220" width="60" height="54" rx="15" fill="#050e1a"/>
      <rect x="212" y="224" width="52" height="46" rx="12" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <ellipse cx="225" cy="234" rx="8" ry="6" fill="#ffffff" opacity="0.65"/>
      <ellipse cx="246" cy="240" rx="3.5" ry="2.5" fill="#ffffff" opacity="0.35"/>
    </g>

    <!-- MOUTH — big happy grin (arc shape) -->
    <g id="mouth">
      <path d="M 158 304 Q 200 328 242 304" fill="#070f1e" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.5"/>
      <path d="M 162 306 Q 200 325 238 306" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
      <path d="M 168 308 Q 200 322 232 308" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
    </g>

    <!-- ANTENNA — same as idle but with bigger glow -->
    <g id="antenna">
      <line x1="200" y1="170" x2="200" y2="115" stroke="#2d3f55" stroke-width="5" stroke-linecap="round"/>
      <line x1="200" y1="170" x2="200" y2="115" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
      <ellipse cx="200" cy="170" rx="8" ry="5" fill="#374151"/>
      <circle cx="200" cy="105" r="28" fill="#22d3ee" opacity="0.15" filter="url(#eyeHalo)"/>
      <circle cx="200" cy="105" r="18" fill="url(#antennaOrb)" filter="url(#orbGlow)"/>
      <ellipse cx="194" cy="98" rx="6" ry="5" fill="#ffffff" opacity="0.5"/>
    </g>
  </g>

  <ellipse cx="200" cy="448" rx="95" ry="12" fill="#000000" opacity="0.15"/>
</svg>
