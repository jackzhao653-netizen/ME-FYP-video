<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2d3f"/><stop offset="50%" stop-color="#1a2535"/><stop offset="100%" stop-color="#0f1723"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141e2e"/><stop offset="100%" stop-color="#0b1320"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc"/><stop offset="45%" stop-color="#1d9fb8"/><stop offset="100%" stop-color="#0c6e86"/>
    </radialGradient>
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bodyShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="fuelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/><stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.6"/><stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="antennaOrb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a5f3fc"/><stop offset="50%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="wheelGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#374151"/><stop offset="70%" stop-color="#1f2937"/><stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <filter id="eyeHalo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="chassisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3f55"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <!-- Sweat drop gradient -->
    <linearGradient id="sweatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- SWEAT DROP (right side of face) -->
  <g id="sweat-drop" transform="translate(300, 210)">
    <path d="M 0,-20 C 10,-10 14,0 14,8 C 14,16 7,22 0,22 C -7,22 -14,16 -14,8 C -14,0 -10,-10 0,-20 Z"
          fill="url(#sweatGrad)" opacity="0.85"/>
    <ellipse cx="-4" cy="6" rx="4" ry="6" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- WHEELS — tilted with body -->
  <g id="wheels">
    <g transform="translate(88, 390)">
      <ellipse cx="2" cy="36" rx="32" ry="10" fill="#000000" opacity="0.3"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-opacity="0.5"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.6"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(312, 390)">
      <ellipse cx="2" cy="36" rx="32" ry="10" fill="#000000" opacity="0.3"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-opacity="0.5"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.6"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(118, 420)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
    <g transform="translate(282, 420)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
  </g>

  <!-- CHASSIS -->
  <g id="chassis">
    <path d="M 80 380 Q 80 400 100 410 L 300 410 Q 320 400 320 380 L 320 350 Q 320 340 310 340 L 90 340 Q 80 340 80 350 Z"
          fill="url(#chassisGrad)" filter="url(#bodyShadow)"/>
    <rect x="85" y="370" width="30" height="8" rx="4" fill="#1e293b"/>
    <rect x="285" y="370" width="30" height="8" rx="4" fill="#1e293b"/>
  </g>

  <!-- BODY — tilted left (anxious lean) -->
  <g id="body" filter="url(#bodyShadow)" transform="rotate(-6, 200, 370)">
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodyGrad)"/>
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodySheen)"/>

    <g id="fuel-glow">
      <rect x="84" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.5"/>
      <rect x="86" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.4"/>
      <rect x="288" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.5"/>
      <rect x="290" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.4"/>
    </g>

    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="url(#faceGrad)"/>
    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.25"/>

    <!-- EYES — worried: inner brows angled down toward center, narrow/tense -->
    <g id="eyes">
      <ellipse cx="163" cy="248" rx="24" ry="18" fill="#22d3ee" opacity="0.08" filter="url(#eyeHalo)"/>
      <ellipse cx="237" cy="248" rx="24" ry="18" fill="#22d3ee" opacity="0.08" filter="url(#eyeHalo)"/>
      <!-- Left eye — angled, slightly squinting -->
      <rect x="135" y="228" width="56" height="40" rx="12" fill="#050e1a"/>
      <rect x="139" y="232" width="48" height="30" rx="10" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <!-- Worried brow line over left eye (inner corner raised) -->
      <path d="M 138 225 Q 152 220 190 228" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
      <ellipse cx="152" cy="240" rx="6" ry="4" fill="#ffffff" opacity="0.4"/>
      <!-- Right eye — angled other way -->
      <rect x="209" y="228" width="56" height="40" rx="12" fill="#050e1a"/>
      <rect x="213" y="232" width="48" height="30" rx="10" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <path d="M 265 225 Q 248 220 210 228" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
      <ellipse cx="226" cy="240" rx="6" ry="4" fill="#ffffff" opacity="0.4"/>
    </g>

    <!-- MOUTH — worried frown curve -->
    <g id="mouth">
      <rect x="152" y="298" width="96" height="30" rx="10" fill="#0a1525"/>
      <rect x="152" y="298" width="96" height="30" rx="10" fill="none" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.2"/>
      <!-- Frown arc: dips down in center -->
      <path d="M 162 306 Q 180 320 200 322 Q 220 320 238 306" fill="none" stroke="#1d9fb8" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
      <line x1="162" y1="320" x2="238" y2="320" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
    </g>

    <!-- ANTENNA — dimmer, slight droop -->
    <g id="antenna">
      <line x1="200" y1="170" x2="194" y2="122" stroke="#2d3f55" stroke-width="5" stroke-linecap="round"/>
      <line x1="200" y1="170" x2="194" y2="122" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.35"/>
      <ellipse cx="200" cy="170" rx="8" ry="5" fill="#374151"/>
      <circle cx="192" cy="112" r="14" fill="#22d3ee" opacity="0.08" filter="url(#eyeHalo)"/>
      <circle cx="192" cy="112" r="12" fill="url(#antennaOrb)" filter="url(#orbGlow)" opacity="0.7"/>
      <ellipse cx="187" cy="107" rx="4" ry="3" fill="#ffffff" opacity="0.3"/>
    </g>
  </g>

  <ellipse cx="200" cy="448" rx="100" ry="14" fill="#000000" opacity="0.2"/>
</svg>
