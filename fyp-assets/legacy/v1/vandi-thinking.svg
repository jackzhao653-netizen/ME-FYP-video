<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3f55"/><stop offset="50%" stop-color="#1e293b"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/><stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2538"/><stop offset="100%" stop-color="#0f1928"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="60%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#a5f3fc"/><stop offset="40%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bodyShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="fuelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/><stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.8"/><stop offset="100%" stop-color="#06b6d4" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="antennaOrb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0f9ff"/><stop offset="40%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <filter id="orbGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="wheelGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#374151"/><stop offset="70%" stop-color="#1f2937"/><stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="wheelRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9"/><stop offset="100%" stop-color="#0891b2" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="eyeHalo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="chassisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3f55"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- THOUGHT BUBBLE DOTS (upper right) -->
  <g id="thought-bubble" opacity="0.85">
    <circle cx="290" cy="165" r="6" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="308" cy="148" r="9" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="330" cy="128" r="13" fill="#8b5cf6" opacity="0.65"/>
    <!-- Thought bubble cloud -->
    <ellipse cx="360" cy="108" rx="28" ry="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
    <ellipse cx="345" cy="98" rx="18" ry="16" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
    <ellipse cx="370" cy="95" rx="15" ry="13" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
    <ellipse cx="358" cy="88" rx="20" ry="14" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Question mark inside cloud -->
    <text x="355" y="115" font-family="Arial" font-size="22" font-weight="bold" fill="#8b5cf6" text-anchor="middle" opacity="0.9">?</text>
  </g>

  <!-- WHEELS -->
  <g id="wheels">
    <g transform="translate(88, 390)">
      <ellipse cx="2" cy="36" rx="32" ry="10" fill="#000000" opacity="0.3"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#wheelRim)" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.8"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(312, 390)">
      <ellipse cx="2" cy="36" rx="32" ry="10" fill="#000000" opacity="0.3"/>
      <circle cx="0" cy="0" r="32" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="32" fill="none" stroke="url(#wheelRim)" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#1e293b"/><circle cx="0" cy="0" r="9" fill="#0f172a"/>
      <circle cx="0" cy="0" r="5" fill="#06b6d4" opacity="0.8"/>
      <line x1="-32" y1="0" x2="32" y2="0" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="-32" x2="0" y2="32" stroke="#374151" stroke-width="1.5" opacity="0.7"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="#374151" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(118, 420)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
    <g transform="translate(282, 420)" opacity="0.6">
      <circle cx="0" cy="0" r="20" fill="url(#wheelGrad)"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
      <circle cx="0" cy="0" r="7" fill="#0f172a"/>
    </g>
  </g>

  <!-- CHASSIS -->
  <g id="chassis">
    <path d="M 80 380 Q 80 400 100 410 L 300 410 Q 320 400 320 380 L 320 350 Q 320 340 310 340 L 90 340 Q 80 340 80 350 Z"
          fill="url(#chassisGrad)" filter="url(#bodyShadow)"/>
    <rect x="85" y="370" width="30" height="8" rx="4" fill="#1e293b"/>
    <rect x="285" y="370" width="30" height="8" rx="4" fill="#1e293b"/>
  </g>

  <!-- BODY — slight tilt right (thinking lean) -->
  <g id="body" filter="url(#bodyShadow)" transform="rotate(4, 200, 370)">
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodyGrad)"/>
    <rect x="80" y="170" width="240" height="200" rx="42" ry="42" fill="url(#bodySheen)"/>

    <g id="fuel-glow">
      <rect x="84" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.6"/>
      <rect x="86" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
      <rect x="288" y="220" width="28" height="80" rx="14" fill="url(#fuelGrad)" opacity="0.6"/>
      <rect x="290" y="222" width="24" height="76" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
    </g>

    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="url(#faceGrad)"/>
    <rect x="112" y="185" width="176" height="160" rx="28" ry="28" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.35"/>

    <!-- EYES — looking up-right -->
    <g id="eyes">
      <ellipse cx="163" cy="242" rx="26" ry="22" fill="#22d3ee" opacity="0.12" filter="url(#eyeHalo)"/>
      <ellipse cx="237" cy="242" rx="26" ry="22" fill="#22d3ee" opacity="0.12" filter="url(#eyeHalo)"/>
      <!-- Left eye — shifted up-right -->
      <rect x="135" y="218" width="56" height="46" rx="14" fill="#050e1a"/>
      <rect x="141" y="220" width="44" height="36" rx="11" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <ellipse cx="159" cy="230" rx="6" ry="4.5" fill="#ffffff" opacity="0.55"/>
      <!-- Right eye — shifted up-right more -->
      <rect x="209" y="218" width="56" height="46" rx="14" fill="#050e1a"/>
      <rect x="217" y="220" width="44" height="36" rx="11" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
      <ellipse cx="235" cy="230" rx="6" ry="4.5" fill="#ffffff" opacity="0.55"/>
    </g>

    <!-- MOUTH — small neutral/pondering -->
    <g id="mouth">
      <rect x="160" y="302" width="80" height="26" rx="9" fill="#0a1525"/>
      <rect x="160" y="302" width="80" height="26" rx="9" fill="none" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.25"/>
      <line x1="170" y1="311" x2="230" y2="311" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
      <line x1="170" y1="320" x2="230" y2="320" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
    </g>

    <!-- ANTENNA — purple glow (brain working) -->
    <g id="antenna">
      <line x1="200" y1="170" x2="210" y2="120" stroke="#2d3f55" stroke-width="5" stroke-linecap="round"/>
      <line x1="200" y1="170" x2="210" y2="120" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
      <ellipse cx="200" cy="170" rx="8" ry="5" fill="#374151"/>
      <!-- Large pulsing orb -->
      <circle cx="212" cy="108" r="30" fill="#8b5cf6" opacity="0.12" filter="url(#orbGlow)"/>
      <circle cx="212" cy="108" r="20" fill="url(#antennaOrb)" filter="url(#orbGlow)"/>
      <ellipse cx="205" cy="101" rx="6" ry="5" fill="#ffffff" opacity="0.4"/>
      <!-- Circuit lines on orb -->
      <circle cx="212" cy="108" r="12" fill="none" stroke="#e0f9ff" stroke-width="0.8" stroke-opacity="0.4"/>
      <line x1="212" y1="96" x2="212" y2="120" stroke="#e0f9ff" stroke-width="0.6" stroke-opacity="0.3"/>
      <line x1="200" y1="108" x2="224" y2="108" stroke="#e0f9ff" stroke-width="0.6" stroke-opacity="0.3"/>
    </g>
  </g>

  <ellipse cx="200" cy="448" rx="100" ry="14" fill="#000000" opacity="0.2"/>
</svg>
